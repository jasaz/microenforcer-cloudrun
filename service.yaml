# =============================================================================
# Cloud Run Service Definition — Multi-Container with MicroEnforcer Sidecar
# =============================================================================
# This YAML defines a Cloud Run service with two containers:
#   1. microenforcer-sidecar: Aqua MicroEnforcer image running as a sidecar
#      container with a shared in-memory volume mounted at /shared.
#   2. flask-app: The main Flask application serving HTTP traffic on port 8080.
#
# The MicroEnforcer image is mirrored from registry.aquasec.com to Artifact
# Registry in the CI pipeline via crane copy. The mirrored image is used
# directly as the sidecar — no custom Dockerfile needed.
#
# Image placeholders (INIT_IMAGE_PLACEHOLDER, APP_IMAGE_PLACEHOLDER) are
# replaced by the CI pipeline with the actual Artifact Registry URIs.
# =============================================================================

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: microenforcer-flask
  labels:
    cloud.googleapis.com/location: asia-south1
  annotations:
    run.googleapis.com/launch-stage: BETA
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Scaling: exactly 1 instance (always warm, no scale-out)
        run.googleapis.com/minScale: "1"
        run.googleapis.com/maxScale: "1"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        # -----------------------------------------------------------------
        # Main container: Flask Hello World application (ingress)
        # -----------------------------------------------------------------
        - name: flask-app
          image: APP_IMAGE_PLACEHOLDER
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: aqua-shared
              mountPath: /shared
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 15

        # -----------------------------------------------------------------
        # Sidecar: Aqua MicroEnforcer (runtime protection)
        # -----------------------------------------------------------------
        - name: microenforcer-sidecar
          image: INIT_IMAGE_PLACEHOLDER
          env:
            - name: AQUA_SERVER
              value: "AQUA_SERVER_PLACEHOLDER"
            - name: AQUA_TOKEN
              value: "AQUA_TOKEN_PLACEHOLDER"
          resources:
            limits:
              cpu: "0.5"
              memory: 256Mi
          volumeMounts:
            - name: aqua-shared
              mountPath: /shared

      volumes:
        - name: aqua-shared
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi
