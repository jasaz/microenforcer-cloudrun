# =============================================================================
# Cloud Run Service Definition — Multi-Container with MicroEnforcer Sidecar
# =============================================================================
# This YAML defines a Cloud Run service with two containers:
#   1. microenforcer-init: Aqua MicroEnforcer init container that copies its
#      binaries from /.aquasec/ to the shared volume at /shared, then runs
#      an nc listener on port 1234 as a startup probe target.
#   2. flask-app: The main Flask application serving HTTP traffic on port 8080.
#      Mounts the shared volume at /.aquasec to receive the MicroEnforcer
#      binaries.
#
# Container startup ordering is controlled via the container-dependencies
# annotation, ensuring the init container is ready before the Flask app starts.
#
# Image placeholders (INIT_IMAGE_PLACEHOLDER, APP_IMAGE_PLACEHOLDER) are
# replaced by the CI pipeline with the actual Artifact Registry URIs.
# =============================================================================

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: microenforcer-flask
  labels:
    cloud.googleapis.com/location: asia-south1
  annotations:
    run.googleapis.com/launch-stage: BETA
    run.googleapis.com/ingress: all
    run.googleapis.com/minScale: "1"
    run.googleapis.com/maxScale: "1"
spec:
  template:
    metadata:
      annotations:
        # Startup ordering: flask-app waits for microenforcer-init to be ready
        run.googleapis.com/container-dependencies: '{"flask-app": ["microenforcer-init"]}'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        # -----------------------------------------------------------------
        # Main container: Flask Hello World application (ingress)
        # Shared volume mounted at /.aquasec to receive MicroEnforcer binaries
        # -----------------------------------------------------------------
        - name: flask-app
          image: APP_IMAGE_PLACEHOLDER
          command: ["/.aquasec/bin/microenforcer"]
          args: ["gunicorn", "--bind", "0.0.0.0:8080", "--workers", "1", "--threads", "2", "app:app"]
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: AQUA_TOKEN
              value: "AQUA_TOKEN_PLACEHOLDER"
            - name: AQUA_SERVER
              value: "AQUA_SERVER_PLACEHOLDER"
            - name: AQUA_DEBUG_LEVEL
              value: "AQUA_DEBUG_LEVEL_PLACEHOLDER"
            - name: AQUA_DEBUG_TYPE
              value: "AQUA_DEBUG_TYPE_PLACEHOLDER"
            - name: AQUA_IMAGE_ID
              value: "AQUA_IMAGE_ID_PLACEHOLDER"
            - name: AQUA_MICROENFORCER
              value: "AQUA_MICROENFORCER_PLACEHOLDER"
            - name: LD_PRELOAD
              value: "LD_PRELOAD_PLACEHOLDER"
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: aqua-shared
              mountPath: /.aquasec
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 15

        # -----------------------------------------------------------------
        # Init container: Aqua MicroEnforcer
        # Copies binaries from /.aquasec/ to /shared (shared volume),
        # then runs nc listener on port 1234 for startup probe.
        # -----------------------------------------------------------------
        - name: microenforcer-init
          image: INIT_IMAGE_PLACEHOLDER
          command: ["/bin/sh"]
          args:
            - "-c"
            - "/bin/cp -rv /.aquasec/* /shared/ && /usr/bin/nc -l -p 1234 && sleep infinity"
          resources:
            limits:
              cpu: "0.5"
              memory: 256Mi
          volumeMounts:
            - name: aqua-shared
              mountPath: /shared
          startupProbe:
            tcpSocket:
              port: 1234
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 1

      volumes:
        - name: aqua-shared
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi
